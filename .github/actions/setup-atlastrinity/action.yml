# yaml-language-server: $schema=https://json.schemastore.org/github-action
name: 'Setup Atlas Trinity'
description: 'Centralized environment setup for Atlas Trinity CI'
author: 'Atlas Trinity Developers'

inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  node-version:
    description: 'Node version to use'
    required: false
    default: '22'
  install-python-deps:
    description: 'Whether to install python dependencies'
    required: false
    default: 'true'
  install-node-deps:
    description: 'Whether to install node dependencies'
    required: false
    default: 'true'
  sync-config:
    description: 'Whether to run config sync'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: 'Set up Python'
      uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: 'Setup Node'
      uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: 'Install Python Dependencies'
      if: ${{ inputs.install-python-deps == 'true' }}
      shell: bash
      run: |
        python -m venv .venv
        mkdir -p bin
        echo "$PWD/.venv/bin" >> $GITHUB_PATH
        echo "$PWD/bin" >> $GITHUB_PATH
        .venv/bin/python -m pip install --upgrade pip
        .venv/bin/pip install -r requirements.txt
        .venv/bin/pip install ruff bandit pyrefly safety detect-secrets pytest pytest-cov pytest-asyncio pytest-timeout zizmor xenon vulture
        curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- -b bin

    - name: 'Install Node Dependencies'
      if: ${{ inputs.install-node-deps == 'true' }}
      shell: bash
      run: npm ci

    - name: 'Sync Configuration'
      if: ${{ inputs.sync-config == 'true' }}
      shell: bash
      run: python src/maintenance/config_sync.py
