name: Self-Healing Cycle
on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:
    inputs:
      mode:
        description: 'Healing mode: diagnose, prevent, improve'
        required: true
        default: 'prevent'
        type: choice
        options:
          - diagnose
          - prevent
          - improve

permissions:
  contents: write
  actions: read

jobs:
  self-healing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run Self-Healing Hypermodule
        env:
          PYTHONPATH: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ github.event.inputs.mode || 'prevent' }}
        run: |
          python -c "
          import asyncio
          import os
          from src.brain.healing import healing_hypermodule, HealingMode

          async def main():
              mode_name = os.environ.get('MODE', 'prevent')
              mode = HealingMode(mode_name)
              print(f'Running self-healing: {mode.value}')
              result = await healing_hypermodule.run(mode)
              print(f'Result: {result.message}')
              if result.details:
                  import json
                  print(json.dumps(result.details, indent=2, default=str))

          asyncio.run(main())
          "

      - name: Commit self-healing changes
        if: success()
        run: |
          git config user.name "Atlas Self-Healing"
          git config user.email "atlas@atlastrinity.local"
          git add -A
          git diff --cached --quiet || git commit -m "[Self-Healing] Automated maintenance cycle"
          git push || echo "Nothing to push"

      - name: Upload diagnostic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-healing-report
          path: |
            ~/.config/atlastrinity/memory/improvement_notes.json
          retention-days: 7
          if-no-files-found: ignore
