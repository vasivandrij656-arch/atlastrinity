name: Total System Integrity Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integrity-check:
    name: System Integrity Audit
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install

      - name: Linting (Lefthook)
        run: npm run lint:all

      - name: Frontend TypeScript check
        run: |
          npx tsc --noEmit -p tsconfig.json
          npx tsc --noEmit -p tsconfig.main.json

      - name: Frontend Vite build
        run: npm run build:renderer

      - name: E2E Total Integrity Test
        env:
          ATLAS_SYSTEM_PASSWORD: ${{ secrets.ATLAS_SYSTEM_PASSWORD }}
          COPILOT_API_KEY: ${{ secrets.COPILOT_API_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:.:./src
          pytest tests/test_e2e_total_integrity.py -v -s
