name: Total System Integrity Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integrity-check:
    name: System Integrity Audit
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.2.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install

      - name: Linting (Lefthook)
        run: npm run lint:all

      - name: E2E Total Integrity Test
        env:
          ATLAS_SYSTEM_PASSWORD: ${{ secrets.ATLAS_SYSTEM_PASSWORD }}
          COPILOT_API_KEY: ${{ secrets.COPILOT_API_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:.:./src
          pytest tests/test_e2e_total_integrity.py -v -s
