name: Total System Integrity Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integrity-check:
    name: System Integrity Audit
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install

      - name: Linting (Lefthook)
        run: npm run lint:all

      - name: Frontend TypeScript check
        run: |
          npx tsc --noEmit -p tsconfig.json
          npx tsc --noEmit -p tsconfig.main.json

      - name: Frontend Vite build
        run: npm run build:renderer

      - name: E2E Total Integrity Test
        env:
          ATLAS_SYSTEM_PASSWORD: ${{ secrets.ATLAS_SYSTEM_PASSWORD }}
          COPILOT_API_KEY: ${{ secrets.COPILOT_API_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:.:./src
          pytest tests/test_e2e_total_integrity.py -v -s
