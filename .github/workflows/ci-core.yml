name: CI Core Pipeline

on:
  push:
    branches: [main, develop, vibe2]
    paths-ignore:
      - '**.md'
      - '.agent/**'
      - 'docs/**'
      - 'scripts/screenshots/**'
      - '.secrets.baseline'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.agent/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'

jobs:
  # ============================================
  # Linting Jobs
  # ============================================

  # ============================================
  # Unified Validation Job
  # ============================================

  validate-codebase:
    name: Lint, Validate & Check Architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          fetch-depth: 0 # Needed for git history analysis in architecture check
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d11ac727c8d92ee4d7bc41b83 # v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Create Virtual Environment & Install Dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          # Install extra tools if not in requirements (though they should be)
          .venv/bin/pip install ruff bandit xenon pyrefly safety detect-secrets

      - name: Install Node Dependencies
        run: npm ci

      - name: Sync Configuration
        run: .venv/bin/python src/maintenance/config_sync.py

      - name: Run Unified Linting (Lefthook)
        run: npx lefthook run lint:all

      - name: Verify Architecture Diagrams
        run: .venv/bin/python src/testing/ci/check_architecture.py

      - name: Validate Mermaid diagrams
        run: |
          .venv/bin/python scripts/validate_mermaid.py
        env:
          # Allow npx to fetch mermaid-cli if not already cached
          CI: true

  # ============================================
  # Integration Jobs
  # ============================================

  sandbox-integration:
    name: MCP Sandbox Integration
    runs-on: ubuntu-latest
    needs: [validate-codebase]
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-sandbox')
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d11ac727c8d92ee4d7bc41b83 # v5.4.0

        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Configuration
        run: python src/maintenance/config_sync.py

      - name: Run MCP Sandbox Test
        env:
          COPILOT_API_KEY: '${{ secrets.COPILOT_API_KEY }}'
          WINDSURF_API_KEY: '${{ secrets.WINDSURF_API_KEY }}'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          # If no API keys, skip gracefully
          if [[ -z "$COPILOT_API_KEY" && -z "$WINDSURF_API_KEY" ]]; then
            echo "⚠️ No AI API keys found. Skipping sandbox test."
            exit 0
          fi

          # Run sandbox test for all servers, chain len 2
          python src/testing/ci/mcp_sandbox.py --all --chain 2

  # ============================================
  # Testing Jobs
  # ============================================

  test-python:
    name: Python Tests & Coverage
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d11ac727c8d92ee4d7bc41b83 # v5.4.0

        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install optional dev dependencies required for docs/diagram exports (cairosvg)
          pip install -r requirements-dev.txt || true
          pip install pytest pytest-cov pytest-asyncio pytest-timeout

      - name: Sync Configuration
        run: python src/maintenance/config_sync.py

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            --junit-xml=pytest-results.xml \
            --timeout=60 \
            -v
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: |
            coverage.xml
            pytest-results.xml

  # ============================================
  # Frontend Validation
  # ============================================

  validate-frontend:
    name: Frontend TypeScript & Lint
    runs-on: ubuntu-latest
    needs: [validate-codebase]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check (renderer)
        run: npx tsc --noEmit -p tsconfig.json

      - name: TypeScript type-check (electron main)
        run: npx tsc --noEmit -p tsconfig.main.json

      - name: Biome lint (renderer & main)
        run: npx @biomejs/biome check src/renderer src/main

      - name: Vite build (renderer)
        run: npm run build:renderer

      - name: Electron TypeScript build
        run: npm run build:electron

  # ============================================
  # Build Jobs
  # ============================================

  build-typescript:
    name: Build TypeScript & Electron
    runs-on: ubuntu-latest
    needs: [validate-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0

        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Build electron (TypeScript)
        run: npm run build:electron

      - name: Upload build artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0

        with:
          name: dist-build
          path: dist/

  # ============================================
  # Configuration Validation
  # ============================================

  validate-configs:
    name: Validate MCP & System Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d11ac727c8d92ee4d7bc41b83 # v5.4.0

        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies for Validation
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML toml

      - name: Sync Configuration
        run: python src/maintenance/config_sync.py

      - name: Validate MCP configuration
        run: python src/testing/ci/validate_mcp_config.py

      - name: Check JSON syntax
        run: |
          find . -name "*.json" -not -path "./node_modules/*" -not -path "./dist_venv/*" -exec python -m json.tool {} \; > /dev/null

      - name: Validate package.json
        run: |
          npm install --package-lock-only
          git diff --exit-code package-lock.json || (echo "package-lock.json is out of sync" && exit 1)

  # ============================================
  # Analysis Jobs
  # ============================================

  #  sonar-analysis:
  #    name: SonarQube Analysis
  #    runs-on: ubuntu-latest
  #    needs: [test-python] # Needs coverage report
  #    if: success()
  #    steps:
  #      - name: Checkout
  #        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
  #        with:
  #          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
  #          submodules: recursive
  #
  #      - name: Download coverage report
  #        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc996a1e # v4.1.8
  #        with:
  #          name: coverage-report
  #          path: .
  #
  #      - name: SonarQube Scan
  #        uses: sonarsource/sonarqube-scan-action@master
  #        env:
  #          SONAR_TOKEN: '${{ secrets.SONAR_TOKEN }}'
  #          SONAR_HOST_URL: '${{ vars.SONAR_HOST_URL }}'
  #        continue-on-error: true # Don't fail CI if Sonar fails (e.g. missing secrets)

  # ============================================
  # Status Summary
  # ============================================

  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs:
      - validate-codebase
      - validate-frontend
      - test-python
      - build-typescript
      - validate-configs
      # - sonar-analysis
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${NEEDS_VALIDATE_CODEBASE_RESULT}" != "success" ]] || \
             [[ "${NEEDS_VALIDATE_FRONTEND_RESULT}" != "success" ]] || \
             [[ "${NEEDS_TEST_PYTHON_RESULT}" != "success" ]] || \
             [[ "${NEEDS_BUILD_TYPESCRIPT_RESULT}" != "success" ]] || \
             [[ "${NEEDS_VALIDATE_CONFIGS_RESULT}" != "success" ]]; then
            echo "❌ One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All critical CI jobs passed successfully"

        env:
          NEEDS_VALIDATE_CODEBASE_RESULT: ${{ needs.validate-codebase.result }}
          NEEDS_VALIDATE_FRONTEND_RESULT: ${{ needs.validate-frontend.result }}
          NEEDS_TEST_PYTHON_RESULT: ${{ needs.test-python.result }}
          NEEDS_BUILD_TYPESCRIPT_RESULT: ${{ needs.build-typescript.result }}
          NEEDS_VALIDATE_CONFIGS_RESULT: ${{ needs.validate-configs.result }}
