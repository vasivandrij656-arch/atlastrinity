name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

# permissions defined at job level

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'

jobs:
  # ============================================
  # Create Release
  # ============================================

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating a release
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Full history for changelog
          submodules: recursive
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Get version from tag or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${INPUTS_VERSION}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
        env:
          INPUTS_VERSION: ${{ inputs.version }}

      - name: Generate changelog
        run: |
          python src/testing/ci/generate_changelog.py "v${STEPS_GET_VERSION_OUTPUTS_VERSION}"
        env:
          STEPS_GET_VERSION_OUTPUTS_VERSION: ${{ steps.get_version.outputs.version }}

      - name: Create release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.get_version.outputs.version }}
          NAME: AtlasTrinity v${{ steps.get_version.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "$NAME" \
            --notes-file CHANGELOG.md \
            --draft=false \
            --prerelease=${{ inputs.prerelease || false }}

  # ============================================
  # Build Release Assets
  # ============================================

  build-release-dmg:
    name: Build Release DMG
    runs-on: macos-latest
    needs: create-release
    permissions:
      contents: write # Needed for uploading assets
    env:
      DMG_NAME: '' # Silence context warning, will be set via $GITHUB_ENV
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0

        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Swift
        uses: swift-actions/setup-swift@646f90d56b0d912b7754ed24d673738e6be0e6f5 # v2.3.1

        with:
          swift-version: '5.9'

      - name: Install dependencies
        run: |
          npm ci
          python3 -m venv dist_venv
          source dist_venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Swift binary
        run: |
          cd vendor/mcp-server-macos-use
          swift build -c release --arch arm64

      - name: Build Electron app
        run: |
          npm run build
          npm run build:dmg
        env:
          APPLE_ID: '${{ secrets.APPLE_ID }}'
          APPLE_APP_SPECIFIC_PASSWORD: '${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}'
          APPLE_TEAM_ID: '${{ secrets.APPLE_TEAM_ID }}'
          CSC_LINK: '${{ secrets.CSC_LINK }}'
          CSC_KEY_PASSWORD: '${{ secrets.CSC_KEY_PASSWORD }}'

      - name: Rename DMG
        run: |
          DMG_PATH=$(find release -name "*.dmg" -maxdepth 1 | head -1)
          NEW_NAME="AtlasTrinity-v${NEEDS_CREATE_RELEASE_OUTPUTS_VERSION}-macOS-arm64.dmg"
          mv "$DMG_PATH" "release/$NEW_NAME"
          echo "DMG_NAME=$NEW_NAME" >> "$GITHUB_ENV"
        env:
          NEEDS_CREATE_RELEASE_OUTPUTS_VERSION: ${{ needs.create-release.outputs.version }}

      - name: Generate checksums
        run: |
          cd release
          shasum -a 256 ./*.dmg > checksums.txt
          cat checksums.txt

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.create-release.outputs.version }}
        run: |
          gh release upload "$TAG" "release/${{ env.DMG_NAME }}" --clobber

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.create-release.outputs.version }}
        run: |
          gh release upload "$TAG" "release/checksums.txt" --clobber

  # ============================================
  # Post-Release Tasks
  # ============================================

  post-release:
    name: Post-Release Tasks
    runs-on: ubuntu-latest
    needs: [create-release, build-release-dmg]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: '${{ secrets.SLACK_WEBHOOK_URL }}'
          VERSION: '${{ needs.create-release.outputs.version }}'
          REPO: '${{ github.repository }}'
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "text": "🎉 AtlasTrinity v${VERSION} released!",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*AtlasTrinity v${VERSION}* has been released!\n\n<https://github.com/${REPO}/releases/tag/v${VERSION}|View Release>"
                }
              }
            ]
          }
          EOF
          )
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"
        continue-on-error: true

      - name: Update documentation
        run: |
          echo "✅ Release v${NEEDS_CREATE_RELEASE_OUTPUTS_VERSION} completed"
          echo "📦 Assets uploaded"
          echo "📝 Changelog generated"

        env:
          NEEDS_CREATE_RELEASE_OUTPUTS_VERSION: ${{ needs.create-release.outputs.version }}

  # ============================================
  # Status Summary
  # ============================================

  release-status:
    name: Release Status
    runs-on: ubuntu-latest
    needs:
      - create-release
      - build-release-dmg
      - post-release
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check results
        run: |
          if [[ "${NEEDS_CREATE_RELEASE_RESULT}" != "success" ]] || \
             [[ "${NEEDS_BUILD_RELEASE_DMG_RESULT}" != "success" ]]; then
            echo "❌ Release failed"
            exit 1
          fi
          echo "✅ Release v${NEEDS_CREATE_RELEASE_OUTPUTS_VERSION} completed successfully"
          echo "🚀 Download: https://github.com/${{ github.repository }}/releases/tag/v${NEEDS_CREATE_RELEASE_OUTPUTS_VERSION}"

        env:
          NEEDS_CREATE_RELEASE_RESULT: ${{ needs.create-release.result }}

          NEEDS_BUILD_RELEASE_DMG_RESULT: ${{ needs.build-release-dmg.result }}

          NEEDS_CREATE_RELEASE_OUTPUTS_VERSION: ${{ needs.create-release.outputs.version }}
