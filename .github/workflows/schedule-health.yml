name: Scheduled Health Checks

on:
  schedule:
    # Run daily at 6 AM UTC (8 AM Kyiv time)
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'

jobs:
  # ============================================
  # System Health Check
  # ============================================

  health-check:
    name: System Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0

        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run Diagnostics (Hypermodule)
        env:
          PYTHONPATH: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: diagnose
        run: |
          python -c "
          import asyncio
          import json
          from src.brain.healing import healing_hypermodule, HealingMode

          async def main():
              print('Running system diagnostics...')
              result = await healing_hypermodule.run(HealingMode.DIAGNOSE)
              print(f'Result: {result.message}')
              
              with open('health-report.json', 'w') as f:
                  json.dump(result.to_dict(), f, indent=2, default=str)
                  
              if not result.success:
                  exit(1)

          asyncio.run(main())
          "

      - name: Upload health report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: health-report-${{ github.run_number }}
          path: health-report.json

  preventive-maintenance:
    name: Preventive Maintenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run Prevention Tasks
        env:
          PYTHONPATH: ${{ github.workspace }}
          MODE: prevent
        run: |
          python -c "
          import asyncio
          from src.brain.healing import healing_hypermodule, HealingMode

          async def main():
              print('Running preventive maintenance...')
              await healing_hypermodule.run(HealingMode.PREVENT)

          asyncio.run(main())
          "

  # ============================================
  # Dependency Security Scan
  # ============================================

  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Check Python dependencies for vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --json > safety-report.json || true
          cat safety-report.json
        continue-on-error: true

      - name: Run Bandit security linter
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          cat bandit-report.json
        continue-on-error: true

      - name: Check npm dependencies
        run: |
          npm audit --json > npm-audit.json || true
          cat npm-audit.json
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0

        if: always()
        with:
          name: security-reports-${{ github.run_number }}
          path: |
            safety-report.json
            bandit-report.json
            npm-audit.json

  # ============================================
  # Performance Benchmarks
  # ============================================

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0

        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-benchmark

      - name: Run MCP connection benchmarks
        run: |
          pytest tests/ -k "benchmark or perf" --benchmark-only --benchmark-json=benchmark.json || true
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Upload benchmark results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0

        if: always()
        with:
          name: benchmarks-${{ github.run_number }}
          path: benchmark.json

  # ============================================
  # Database Integrity Check
  # ============================================

  database-check:
    name: Database Integrity Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: atlastrinity_health
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0

        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database health check
        run: |
          python scripts/db_report.py
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/atlastrinity_health

      - name: Check for schema migrations
        run: |
          echo "Checking for pending migrations..."
          # Add migration check logic here
        continue-on-error: true

  # ============================================
  # Model Availability Check
  # ============================================

  model-check:
    name: AI Model Availability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0

        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check Windsurf API
        run: |
          python -c "
          import os
          import requests
          api_key = os.getenv('WINDSURF_API_KEY', '')
          if api_key:
              headers = {'Authorization': f'Bearer {api_key}'}
              response = requests.get('https://server.self-serve.windsurf.com/v1/models', headers=headers)
              if response.status_code == 200:
                  print('✅ Windsurf API accessible')
              else:
                  print(f'⚠️ Windsurf API error: {response.status_code}')
          else:
              print('ℹ️ No Windsurf API key configured')
          "
        continue-on-error: true
        env:
          WINDSURF_API_KEY: '${{ secrets.WINDSURF_API_KEY }}'

      - name: Check Copilot API
        run: |
          python -c "
          import os
          import requests
          api_key = os.getenv('COPILOT_API_KEY', '')
          if api_key:
              headers = {'Authorization': f'Bearer {api_key}'}
              response = requests.get('https://api.githubcopilot.com/models', headers=headers)
              if response.status_code == 200:
                  print('✅ Copilot API accessible')
              else:
                  print(f'⚠️ Copilot API error: {response.status_code}')
          else:
              print('ℹ️ No Copilot API key configured')
          "
        continue-on-error: true
        env:
          COPILOT_API_KEY: '${{ secrets.COPILOT_API_KEY }}'

  # ============================================
  # Status Report
  # ============================================

  generate-report:
    name: Generate Health Report
    runs-on: ubuntu-latest
    needs:
      - health-check
      - security-scan
      - performance-benchmarks
      - database-check
      - model-check
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: false
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc996a1e # v4.1.8

        with:
          path: ./artifacts

      - name: Generate summary report
        run: |
          {
            echo "# AtlasTrinity Health Report"
            echo ""
            echo "**Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "**Run:** #${{ github.run_number }}"
            echo ""
            echo "## Job Results"
            echo "- Health Check: ${NEEDS_HEALTH_CHECK_RESULT}"
            echo "- Security Scan: ${NEEDS_SECURITY_SCAN_RESULT}"
            echo "- Performance: ${NEEDS_PERFORMANCE_BENCHMARKS_RESULT}"
            echo "- Database: ${NEEDS_DATABASE_CHECK_RESULT}"
            echo "- Model APIs: ${NEEDS_MODEL_CHECK_RESULT}"
          } > health-summary.md

          cat health-summary.md
        env:
          NEEDS_HEALTH_CHECK_RESULT: ${{ needs.health-check.result }}
          NEEDS_SECURITY_SCAN_RESULT: ${{ needs.security-scan.result }}
          NEEDS_PERFORMANCE_BENCHMARKS_RESULT: ${{ needs.performance-benchmarks.result }}
          NEEDS_DATABASE_CHECK_RESULT: ${{ needs.database-check.result }}
          NEEDS_MODEL_CHECK_RESULT: ${{ needs.model-check.result }}

      - name: Upload summary
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0

        with:
          name: health-summary
          path: health-summary.md

      - name: Send notification on failures
        if: ${{ needs.health-check.result == 'failure' || needs.security-scan.result == 'failure' }}
        run: |
          echo "⚠️ Health check detected issues!"
          # Add notification logic (Slack, email, etc.)
