name: Auto-commit Secrets Baseline

on:
  push:
    branches: [ main ]
    paths: 
      - '**'
      - '!.secrets.baseline'
  workflow_dispatch:

jobs:
  auto-commit-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        persist-credentials: false
        
    - name: Setup Python
      uses: actions/setup-python@f271371b8c96bc3893fb67b49958b49160d8f3a5 # v5.4.0
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        pip install detect-secrets
        npm install
        
    - name: Load GitHub token from environment
      run: |
        if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
          echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_ENV"
          echo "🔑 Using GITHUB_TOKEN from secrets"
        fi
        
    - name: Check if GitHub CLI is available
      run: |
        if command -v gh &> /dev/null; then
          if gh api user --jq '.login' &> /dev/null; then
            echo "🔗 GitHub CLI authenticated."
            echo "USE_GH_CLI=true" >> "$GITHUB_ENV"
          else
            echo "⚠️ GitHub CLI not authenticated. Using git push with token."
            echo "USE_GH_CLI=false" >> "$GITHUB_ENV"
          fi
        else
          echo "⚠️ GitHub CLI not found. Using git push with token."
          echo "USE_GH_CLI=false" >> "$GITHUB_ENV"
        fi
        
    - name: Configure git with token if needed
      if: env.USE_GH_CLI == 'false'
      run: |
        git remote set-url origin "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        echo "🔐 Configured git remote with token."
        
    - name: Run security scan and update baseline
      run: |
        echo "🔍 Running detect-secrets scan..."
        detect-secrets scan --baseline .secrets.baseline --slim
        
        echo "🧹 Cleaning up baseline file..."
        jq 'del(.generated_at)' .secrets.baseline > .secrets.baseline.tmp
        mv .secrets.baseline.tmp .secrets.baseline
        
    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain .secrets.baseline)" ]; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "📋 Changes detected in .secrets.baseline"
          git status --porcelain .secrets.baseline
        else
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "ℹ️ No changes in .secrets.baseline"
        fi
        
    - name: Stage and commit changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        echo "📦 Staging .secrets.baseline..."
        git add .secrets.baseline
        
        # Create commit with timestamp
        TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
        COMMIT_MSG="Auto-update: .secrets.baseline - $TIMESTAMP

        - Updated secrets baseline after security scan
        - Auto-generated commit to avoid manual intervention
        - Triggered by: ${{ github.event_name }}"
        
        echo "📝 Creating commit: $COMMIT_MSG"
        git config user.name "Atlas Security Bot"
        git config user.email "security@atlastrinity.local"
        git commit --no-verify -m "$COMMIT_MSG"
        
    - name: Push changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        echo "🚀 Pushing to GitHub..."
        if [ "$USE_GH_CLI" = true ]; then
          git push
        else
          git push origin main
        fi
        
        echo "✅ .secrets.baseline successfully committed and pushed!"
        echo "📊 Commit: $(git log -1 --oneline)"
