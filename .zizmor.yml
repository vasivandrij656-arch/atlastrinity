# zizmor configuration
rules:
  unpinned-uses:
    disable: false
  excessive-permissions:
    disable: false
  template-injection:
    disable: false
  cache-poisoning:
    disable: true
  archived-uses:
    disable: false
  artipacked:
    disable: false
  dangerous-triggers:
    disable: false
    ignore:
      - '.github/workflows/auto-fix.yml'
