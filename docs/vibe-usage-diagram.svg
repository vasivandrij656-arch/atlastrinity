<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <style> .box { fill:#f7fbff; stroke:#2b6cb0; stroke-width:1.5; rx:8; } .small { font:12px sans-serif; fill:#1a202c } .title { font:14px sans-serif; font-weight:700; fill:#1a202c } .muted { font:11px sans-serif; fill:#4a5568 }</style>

  <!-- UI -->
  <rect x="30" y="40" width="180" height="60" class="box"/>
  <text x="40" y="60" class="title">User / UI</text>
  <text x="40" y="78" class="muted">(Electron / CLI)</text>

  <!-- MCP -->
  <rect x="250" y="40" width="220" height="60" class="box"/>
  <text x="260" y="60" class="title">MCP Manager / API</text>
  <text x="260" y="78" class="muted">(mcp_manager)</text>

  <!-- Vibe Server -->
  <rect x="520" y="30" width="300" height="84" class="box"/>
  <text x="540" y="52" class="title">src/mcp_server/vibe_server.py</text>
  <text x="540" y="72" class="small">MCP wrapper • prompt, sessions, queue, VIBE_HOME</text>

  <!-- Vibe Config -->
  <rect x="520" y="140" width="300" height="64" class="box"/>
  <text x="540" y="160" class="title">vibe_config.py / template</text>
  <text x="540" y="178" class="small">models, providers, tool-permissions</text>

  <!-- Vibe CLI -->
  <rect x="520" y="240" width="260" height="64" class="box"/>
  <text x="540" y="260" class="title">Vibe CLI (binary)</text>
  <text x="540" y="278" class="small">VIBE_HOME overrides • instructions & logs</text>

  <!-- Providers / Proxies -->
  <rect x="800" y="240" width="160" height="60" class="box"/>
  <text x="814" y="260" class="title">Providers</text>
  <text x="814" y="278" class="small">Mistral • Copilot • Windsurf</text>
  <text x="814" y="294" class="muted">(proxy when required)</text>

  <!-- Workspace & Sessions -->
  <rect x="520" y="340" width="260" height="64" class="box"/>
  <text x="540" y="360" class="title">vibe_workspace / ~/.vibe/logs</text>
  <text x="540" y="378" class="small">instructions, session logs, artifacts</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b6cb0" />
    </marker>
  </defs>
  <line x1="210" y1="70" x2="250" y2="70" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="70" x2="520" y2="70" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="114" x2="670" y2="140" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="204" x2="670" y2="240" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="780" y1="272" x2="800" y2="272" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="780" y1="304" x2="720" y2="304" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Notes -->
  <text x="30" y="520" class="muted">Diagram autogenerated — показано основні потоки: UI → MCP → vibe_server → Vibe CLI → provider/proxy → workspace/logs.</text>
</svg>