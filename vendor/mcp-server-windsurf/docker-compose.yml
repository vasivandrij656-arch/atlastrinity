version: '3.8'

services:
  windsurf-mcp:
    build:
      context: ./vendor/mcp-server-windsurf
      dockerfile: Dockerfile
    container_name: windsurf-mcp-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - WINDSURF_API_KEY=${WINDSURF_API_KEY}
      - WINDSURF_LOG_LEVEL=info
      - WINDSURF_CACHE_SIZE=100
      - WINDSURF_ENABLE_PLUGINS=true
      - WINDSURF_CONFIG_PATH=/app/.config/atlastrinity/windsurf_config.json
    volumes:
      - windsurf_config:/app/.config/atlastrinity
      - windsurf_logs:/app/.config/atlastrinity/logs
      - windsurf_workspaces:/app/.config/atlastrinity/windsurf_workspaces
      - windsurf_plugins:/app/.config/atlastrinity/plugins
      - ${WORKSPACE_PATH:-./workspace}:/app/workspace:rw
    networks:
      - windsurf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.windsurf-mcp.rule=Host(`windsurf-mcp.localhost`)"
      - "traefik.http.services.windsurf-mcp.loadbalancer.server.port=8080"

  redis:
    image: redis:7-alpine
    container_name: windsurf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - windsurf-network
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: windsurf-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - windsurf-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  grafana:
    image: grafana/grafana:latest
    container_name: windsurf-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - windsurf-network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    container_name: windsurf-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf
      - ./monitoring/ssl:/etc/nginx/ssl
    networks:
      - windsurf-network
    depends_on:
      - windsurf-mcp

volumes:
  windsurf_config:
    driver: local
  windsurf_logs:
    driver: local
  windsurf_workspaces:
    driver: local
  windsurf_plugins:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  windsurf-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
