events {
    scrape_interval: 15s
    evaluation_interval: 15s
}

rule_files:
  - "windsurf_rules.yml"

scrape_configs:
  - job_name: 'windsurf-mcp'
    static_configs:
      - targets: ['windsurf-mcp-server:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'redis'
    static_configs:
      - targets: ['windsurf-redis:6379']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
      - targets:
        - alertmanager:9093

rule_files:
  - "windsurf_alerts.yml"
